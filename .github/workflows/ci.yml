name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src eval scripts tests
      - name: Test
        run: pytest -q
      - name: Eval (ablation must hold)
        run: |
          python eval/run_eval.py
          python - <<'PY'
          import json
          r = json.load(open("eval/results.json"))["configs"]
          # CI guard: the critic loop must clear AA on the vast majority of
          # pairings and beat the naive baseline by a wide margin.
          assert r["critic-loop"]["aa_pass_rate"] >= 0.85, r["critic-loop"]
          assert r["critic-loop"]["aggregate"] - r["naive"]["aggregate"] >= 0.2, r
          print("ablation guard passed:", r["naive"]["aa_pass_rate"],
                "->", r["critic-loop"]["aa_pass_rate"])
          PY
